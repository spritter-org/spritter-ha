name: "Spritter"
version: "1.0.2"
slug: "spritter"
description: Async fuel price collector that publishes station updates to MQTT.
url: https://github.com/spritter-org/spritter-ha
startup: application
boot: auto
init: false
ingress: false
services:
  - "mqtt:need"
arch:
  - aarch64
  - amd64
options:
  refresh_interval_minutes: 5
  stations: []
schema:
  refresh_interval_minutes: int(1,10080)
  stations:
    - provider: str
      station_id: str
      name: str?
      keys:
        - str?
      user_agent: str?