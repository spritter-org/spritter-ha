name: Spritter Add-On
version: 1.0.0
slug: spritter_addon
description: Async fuel price collector that publishes station updates to MQTT.
url: https://github.com/spritter-org/spritter-ha
startup: application
boot: auto
init: false
ingress: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - addon_config:rw
services:
  - mqtt: true