name: Spritter Add-On
version: 0.2.0
slug: spritter_addon
description: Fuel price map API with basic station management UI.
url: https://github.com/spritter-org/spritter-ha
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_title: Spritter
panel_icon: mdi:gas-station
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - config:rw
  - addon_config:rw
schema:
  refresh_interval_seconds: int(10,3600)
  stations:
    - provider: str
      station_id: str
      name: str?
      keys:
        - str?
      user_agent: str?
options:
  refresh_interval_seconds: 300
  stations: []
