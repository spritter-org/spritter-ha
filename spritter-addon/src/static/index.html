<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spritter Add-On</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>Spritter Add-On</h1>
        <p>Configure stations and expose price-map API for Home Assistant consumers.</p>
      </header>

      <section class="card">
        <h2>Base Configuration</h2>
        <label for="refresh-interval">Refresh interval (seconds)</label>
        <input id="refresh-interval" type="number" min="10" max="3600" value="300" />
      </section>

      <section class="card">
        <h2>Stations</h2>
        <form id="station-form" class="grid">
          <input id="provider" placeholder="provider (e.g. jet)" required />
          <input id="station-id" placeholder="station id" required />
          <input id="station-name" placeholder="name (optional)" />
          <input id="keys" placeholder="keys, comma-separated (optional)" />
          <button type="submit">Add station</button>
        </form>

        <ul id="station-list" class="station-list"></ul>
      </section>

      <section class="card actions">
        <button id="save-btn">Save configuration</button>
        <button id="refresh-btn" class="secondary">Preview price map</button>
      </section>

      <section class="card">
        <h2>Price Map Preview</h2>
        <pre id="price-preview">{}</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
